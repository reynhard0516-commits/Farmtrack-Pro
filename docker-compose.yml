version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: farmtrack-mongodb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: farmtrack-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=farmtrack_pro
      - CORS_ORIGINS=http://localhost:3000,http://localhost
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: farmtrack-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
